backend:
  name: git-gateway
  branch: main
media_folder: "images"
public_folder: "/images"
collections:
  - name: "casi_studio"
    label: "Casi studio"
    folder: "_casi"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Nome cliente", name: "nome", widget: "string"}
      - {label: "Sport e livello", name: "sport", widget: "string"}
      - {label: "Risultato principale", name: "risultato_num", widget: "string"}
      - {label: "Etichetta risultato", name: "risultato_label", widget: "string"}
      - {label: "Feedback cliente", name: "quote", widget: "text"}
      - {label: "Commento Nicolas", name: "nicolas", widget: "text"}
      - {label: "Cosa è stato svolto (lista, una per riga)", name: "lavoro", widget: "list"}
      - {label: "Foto cliente", name: "foto", widget: "image", required: false}
