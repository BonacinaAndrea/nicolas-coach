<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    window.addEventListener('load', function() {
      const hash = window.location.hash;
      if (hash && (hash.includes('invite_token') || hash.includes('recovery_token') || hash.includes('access_token'))) {
        window.location.href = '/admin/' + hash;
      }
    });
  </script>
</head>
<body></body>
</html>
